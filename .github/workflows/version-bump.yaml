name: 🔄 Auto Version Bump
on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: version-bump-${{ github.ref }}
  cancel-in-progress: false
jobs:
  release:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(version):') }}
    runs-on: ubuntu-latest
    name: Bump packages and update changelogs with cocogitto
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Cocogitto monorepo release
        id: release
        uses: cocogitto/cocogitto-action@v3
        with:
          release: true
          git-user: 'cog-bot'
          git-user-email: 'cog-bot@users.noreply.github.com'
