doublestar: true
yaml_files:
  - "**/*.yaml"
  - "**/*.yml"
  - ".yamlfmt"
exclude:
  - "**/vendor/**"
  - "**/node_modules/**"
formatter:
  type: basic
  retain_line_breaks: false
  retain_line_breaks_single: true
  pad_line_comments: 2
  trim_trailing_whitespace: true
  line_length: 100
  indentation: 2
  preserve_quotes: true
