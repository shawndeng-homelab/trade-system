site_name: trade-system
repo_url: https://github.com/shawndeng-homelab/trade-system
site_url: https://shawndeng-homelab.github.io/trade-system
site_description: my trade tools
site_author: shawndeng
edit_uri: edit/main/docs/
repo_name: shawndeng-homelab/trade-system
copyright: Maintained by <a href="https://github.com/shawndeng-homelab">shawndeng</a>.
nav:
  - Home: index.md
  - Strategies:
      - Option management: strategies/option-management.md
  - API Reference: reference/
plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
        - docs/gen_home_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          # Packages are installed (via `uv run --all-packages`), so mkdocstrings
          # discovers every workspace package through sys.path — no per-package
          # `paths` entries to maintain when new packages are added.
          options:
            docstring_style: "google"
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            show_bases: true
            merge_init_into_class: true
            docstring_section_style: "spacy"
            show_if_no_docstring: false
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shawndeng-homelab/trade-system
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/trade-system-core
