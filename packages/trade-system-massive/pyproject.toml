[project]
name = "trade-system-massive"
version = "0.1.0"
description = "NautilusTrader data adapter for the Massive.com (Polygon-compatible) REST + WebSocket API"
authors = [{name = "shawndeng", email = "shawndeng1109@qq.com"}]
license = "MIT"
readme = "README.md"
requires-python = ">=3.12,<3.14.99"
dependencies = [
    "nautilus-trader~=1.230.0",
    "massive>=2.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/trade_system_massive"]
